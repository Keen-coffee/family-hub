version: "3.9"
services:
  app:
    image: ghcr.io/keen-coffee/family-hub:latest
    ports:
      - "0.0.0.0:8080:3001"
    volumes:
      - ./data:/app/data
    env_file:
      - server/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
